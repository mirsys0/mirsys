<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restaurants de Québec</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            overflow: hidden; 
        }

        /* 로딩 스크린 */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #f3f3f3; border-top: 4px solid #2b2d42;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-text { font-size: 16px; font-weight: 700; color: #2b2d42; margin-bottom: 8px;}
        #loading-subtext { font-size: 13px; color: #6c757d; }

        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100vw; height: 100dvh; z-index: 1; }

        #top-nav {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: flex; background: rgba(255, 255, 255, 0.95); padding: 4px;
            border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; backdrop-filter: blur(5px);
        }
        .nav-btn {
            background: transparent; border: none; padding: 10px 20px; border-radius: 25px;
            font-size: 14px; font-weight: 600; color: #6c757d; cursor: pointer; transition: all 0.3s ease;
        }
        .nav-btn.active { background: #2b2d42; color: white; box-shadow: 0 2px 8px rgba(43,45,66,0.3); }

        #bottom-sheet {
            position: absolute; bottom: 0; left: 0; width: 100vw; height: 45dvh;
            background: white; border-radius: 24px 24px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            z-index: 1000; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        #bottom-sheet.minimized { transform: translateY(calc(100% - 60px)); }

        .drag-handle { width: 100%; height: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .drag-bar { width: 40px; height: 5px; background: #dee2e6; border-radius: 10px; }
        .sheet-header { padding: 0 20px 10px; font-size: 18px; font-weight: 700; color: #2b2d42; display: flex; justify-content: space-between; align-items: center; }

        #place-list { flex-grow: 1; overflow-y: auto; padding: 0 15px 20px; -webkit-overflow-scrolling: touch; }
        .place-card { display: flex; align-items: center; padding: 15px; background: #ffffff; border: 1px solid #f1f3f5; border-radius: 16px; margin-bottom: 12px; cursor: pointer; }
        .place-emoji { font-size: 28px; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 12px; margin-right: 15px; flex-shrink: 0; }
        .place-info { flex-grow: 1; }
        .place-name { font-size: 15px; font-weight: 700; color: #2b2d42; margin-bottom: 4px; }
        .place-desc { font-size: 12px; color: #6c757d; line-height: 1.4; }

        .custom-marker {
            background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 22px; box-shadow: 0 3px 8px rgba(0,0,0,0.2); transition: transform 0.2s;
        }
        .marker-upper { border: 2px solid #ef233c; } 
        .marker-lower { border: 2px solid #3a86ff; } 

        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 4px; }
        .leaflet-popup-content { margin: 12px; }
        .popup-title { font-size: 16px; font-weight: 700; color: #2b2d42; margin: 0 0 6px 0; display: flex; align-items: center; gap: 6px; }
        .popup-desc { font-size: 13px; color: #495057; margin-bottom: 8px; line-height: 1.4; }
        .popup-addr { font-size: 11px; color: #adb5bd; border-top: 1px solid #f1f3f5; padding-top: 8px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">지도를 준비하고 있습니다...</div>
        <div id="loading-subtext">실시간 주소 변환 중 (최대 15초 소요)</div>
    </div>

    <div id="map"></div>

    <div id="top-nav">
        <button id="btn-upper" class="nav-btn active" onclick="filterPlaces('upper')">Upper Town</button>
        <button id="btn-lower" class="nav-btn" onclick="filterPlaces('lower')">Lower Town</button>
    </div>

    <div id="bottom-sheet">
        <div class="drag-handle" onclick="toggleSheet()">
            <div class="drag-bar"></div>
        </div>
        <div class="sheet-header">
            <span id="sheet-title">Upper Town</span>
        </div>
        <div id="place-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 식당 데이터 (lat, lng 삭제 / 검색 정확도를 위해 searchAddress 항목 추가)
        const foodPlaces = [
            // Upper Town
            { id: 1, name: "Le Beffroi Steak House", emoji: "🥩", type: "upper", desc: "단풍나무 숯으로 구운 최고의 안심 스테이크", address: "775 Av. Honoré-Mercier", searchAddress: "775 Avenue Honoré-Mercier, Québec, QC, Canada" },
            { id: 2, name: "Cochons Dingues (St-Jean)", emoji: "🐷", type: "upper", desc: "유튜버들도 칭찬한 고기(폭립) 맛집", address: "1014 Rue Saint-Jean", searchAddress: "1014 Rue Saint-Jean, Québec, QC, Canada" },
            { id: 3, name: "Au Petit Coin Breton", emoji: "🥗", type: "upper", desc: "할아버지 때부터 내려온 그라탕과 크레페 집", address: "1029 Rue Saint-Jean", searchAddress: "1029 Rue Saint-Jean, Québec, QC, Canada" },
            { id: 4, name: "Pub Saint-Alexandre", emoji: "🎵", type: "upper", desc: "맥주와 신나는 라이브 재즈 음악", address: "1087 Rue Saint-Jean", searchAddress: "1087 Rue Saint-Jean, Québec, QC, Canada" },
            { id: 5, name: "Paillard", emoji: "🥐", type: "upper", desc: "바삭바삭 크로아상과 달콤한 마카롱 빵집", address: "1097 Rue Saint-Jean", searchAddress: "1097 Rue Saint-Jean, Québec, QC, Canada" },
            { id: 6, name: "Chez Boulay", emoji: "🐟", type: "upper", desc: "아주 유명한 요리사님이 해주는 민물고기 요리", address: "1110 Rue Saint-Jean", searchAddress: "1110 Rue Saint-Jean, Québec, QC, Canada" },
            { id: 7, name: "McDonald's", emoji: "🍟", type: "upper", desc: "다 귀찮고 익숙한 맛이 당길 때!", address: "1151 Rue Saint-Jean", searchAddress: "1151 Rue Saint-Jean, Québec, QC, Canada" },
            { id: 8, name: "Le Casse-Crêpe Breton", emoji: "🥞", type: "upper", desc: "요리하는 모습을 직접 구경하며 먹는 크레페", address: "1136 Rue Saint-Jean", searchAddress: "1136 Rue Saint-Jean, Québec, QC, Canada" },
            { id: 9, name: "Portofino", emoji: "🍕", type: "upper", desc: "뜨거운 화덕 피자와 수제 파스타", address: "54 Rue Couillard", searchAddress: "54 Rue Couillard, Québec, QC, Canada" },
            { id: 10, name: "Restaurant 1640", emoji: "🐌", type: "upper", desc: "어린이 메뉴와 달팽이 요리가 있는 오래된 식당", address: "16 Rue Sainte-Anne", searchAddress: "16 Rue Sainte-Anne, Québec, QC, Canada" },
            { id: 11, name: "Le Chic Shack", emoji: "🍔", type: "upper", desc: "항상 줄을 서서 먹는 수제 햄버거", address: "15 Rue du Fort", searchAddress: "15 Rue du Fort, Québec, QC, Canada" },
            { id: 12, name: "Aux Anciens Canadiens", emoji: "🍲", type: "upper", desc: "퀘벡에서 가장 오래된 집에서 먹는 전통 요리", address: "34 Rue Saint-Louis", searchAddress: "34 Rue Saint-Louis, Québec, QC, Canada" },
            { id: 13, name: "Restaurant Parmesan", emoji: "🍝", type: "upper", desc: "아코디언 연주를 들으며 먹는 해산물 파스타", address: "38 Rue Saint-Louis", searchAddress: "38 Rue Saint-Louis, Québec, QC, Canada" },
            { id: 14, name: "La Bûche", emoji: "🏕️", type: "upper", desc: "숲속 사냥꾼의 집처럼 생긴 퀘벡 백반집", address: "49 Rue Saint-Louis", searchAddress: "49 Rue Saint-Louis, Québec, QC, Canada" },
            { id: 15, name: "Marché Richelieu", emoji: "🛒", type: "upper", desc: "배고플 때 컵라면과 퀘벡 과자를 살 수 있는 마트", address: "850 Rue Saint-Jean", searchAddress: "850 Rue Saint-Jean, Québec, QC, Canada" },
            
            // Lower Town
            { id: 16, name: "Le Lapin Sauté", emoji: "🐰", type: "lower", desc: "귀여운 토끼 간판! 토끼 고기와 오리 고기", address: "52 Rue du Petit Champlain", searchAddress: "52 Rue du Petit Champlain, Québec, QC, Canada" },
            { id: 17, name: "Cochons Dingues (Champlain)", emoji: "🍖", type: "lower", desc: "벽돌로 예쁘게 꾸며진 곳에서 먹는 고기", address: "46 Bd Champlain", searchAddress: "46 Boulevard Champlain, Québec, QC, Canada" },
            { id: 18, name: "Queues de Castor", emoji: "🦫", type: "lower", desc: "비버 꼬리를 닮은 빵 최고의 간식", address: "28 Boulevard Champlain", searchAddress: "28 Boulevard Champlain, Québec, QC, Canada" },
            { id: 19, name: "Q-de-Sac Resto-Pub", emoji: "🧀", type: "lower", desc: "화덕피자랑 감자튀김 요리(푸틴)를 파는 곳", address: "10 Rue du Cul-de-Sac", searchAddress: "10 Rue du Cul-de-Sac, Québec, QC, Canada" },
            { id: 20, name: "Archibald Microbrasserie", emoji: "🍻", type: "lower", desc: "상 받은 맛있는 맥주와 피자", address: "40 Rue du Marché-Champlain", searchAddress: "40 Rue du Marché-Champlain, Québec, QC, Canada" },
            { id: 21, name: "La Maison Smith", emoji: "☕", type: "lower", desc: "광장 앞에 있는 제일 유명한 카페", address: "23 Rue Notre-Dame", searchAddress: "23 Rue Notre-Dame, Québec, QC, Canada" }
        ];

        let markers = {};
        const map = L.map('map', { zoomControl: false }).setView([46.8130, -71.2080], 15);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const listContainer = document.getElementById('place-list');
        const sheetTitle = document.getElementById('sheet-title');
        const bottomSheet = document.getElementById('bottom-sheet');

        // 주소를 위도/경도로 변환하는 함수 (Geocoding API)
        async function geocodeAddress(address) {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.length > 0) {
                    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                }
            } catch (error) {
                console.error("Geocoding error:", error);
            }
            return null;
        }

        // 앱 초기화 (좌표 추출 -> 마커 생성)
        async function initApp() {
            for (let i = 0; i < foodPlaces.length; i++) {
                const place = foodPlaces[i];
                const coords = await geocodeAddress(place.searchAddress);
                
                if (coords) {
                    place.lat = coords.lat;
                    place.lng = coords.lng;
                } else {
                    // 변환 실패 시 기본 좌표로 폴백
                    place.lat = 46.8130;
                    place.lng = -71.2080;
                }
                
                // OpenStreetMap API 사용 정책 준수를 위한 의도적 딜레이 (서버 차단 방지)
                await new Promise(resolve => setTimeout(resolve, 600)); 
            }

            // 지오코딩 완료 후 로딩 스크린 숨김 및 지도 렌더링
            document.getElementById('loading-screen').style.display = 'none';
            renderMap();
            filterPlaces('upper');
        }

        function renderMap() {
            foodPlaces.forEach(place => {
                if(!place.lat || !place.lng) return; // 좌표가 없는 경우 건너뜀

                const markerClass = place.type === 'upper' ? 'marker-upper' : 'marker-lower';
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="custom-marker ${markerClass}" style="width:40px; height:40px;">${place.emoji}</div>`,
                    iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -20]
                });

                const marker = L.marker([place.lat, place.lng], { icon: customIcon });
                marker.bindPopup(`
                    <h3 class="popup-title"><span>${place.emoji}</span> ${place.name}</h3>
                    <div class="popup-desc">${place.desc}</div>
                    <div class="popup-addr">📍 ${place.address}</div>
                `);
                
                marker.on('click', () => {
                    map.setView([place.lat - 0.0005, place.lng], 17, { animate: true });
                    minimizeSheet();
                });
                markers[place.id] = marker;
            });
        }

        function filterPlaces(type) {
            document.getElementById('btn-upper').classList.toggle('active', type === 'upper');
            document.getElementById('btn-lower').classList.toggle('active', type === 'lower');

            const bounds = L.latLngBounds();
            foodPlaces.forEach(place => {
                if(!place.lat) return;
                
                if (place.type === type) {
                    if(markers[place.id]) {
                        markers[place.id].addTo(map);
                        bounds.extend([place.lat, place.lng]);
                    }
                } else {
                    if(markers[place.id]) map.removeLayer(markers[place.id]);
                }
            });

            if(Object.keys(bounds).length > 0) {
                map.fitBounds(bounds, { paddingBottomRight: [0, window.innerHeight * 0.45], maxZoom: 16 });
            }

            listContainer.innerHTML = '';
            const filtered = foodPlaces.filter(p => p.type === type);
            sheetTitle.innerText = `${type === 'upper' ? 'Upper Town' : 'Lower Town'} (${filtered.length})`;

            filtered.forEach(place => {
                const card = document.createElement('div');
                card.className = 'place-card';
                card.innerHTML = `
                    <div class="place-emoji">${place.emoji}</div>
                    <div class="place-info">
                        <div class="place-name">${place.name}</div>
                        <div class="place-desc">${place.desc}</div>
                    </div>
                `;
                card.onclick = () => {
                    map.setView([place.lat - 0.0005, place.lng], 18, { animate: true });
                    markers[place.id].openPopup();
                    minimizeSheet();
                };
                listContainer.appendChild(card);
            });
            
            document.getElementById('bottom-sheet').classList.remove('minimized');
        }

        function toggleSheet() { document.getElementById('bottom-sheet').classList.toggle('minimized'); }
        function minimizeSheet() { document.getElementById('bottom-sheet').classList.add('minimized'); }
        map.on('click', minimizeSheet);

        // 앱 시작
        initApp();
    </script>
</body>
</html>
