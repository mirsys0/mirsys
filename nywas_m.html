<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파란여행 | 뉴욕+워싱턴 3박4일</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --hh:52px;
  --dep:#5bb8f5; --d1:#f4a261; --d2:#2a9d8f; --d3:#e76f51; --d4:#9b72cf;
  --meal:#e8b84b; --hotel:#5ab0d8; --navy:#0d1b2a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;}

/* MAP — full screen behind everything */
#map{position:fixed;inset:0;top:var(--hh);z-index:1;}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;height:var(--hh);z-index:200;
  background:linear-gradient(135deg,#0d1b2a 0%,#1a3050 100%);
  border-bottom:2px solid rgba(200,168,75,.4);
  display:flex;align-items:center;padding:0 14px;gap:10px;
}
.logo{background:#c8a84b;color:#0d1b2a;font-size:11px;font-weight:900;padding:3px 10px;border-radius:12px;white-space:nowrap;}
.hinfo h1{color:#fff;font-size:14px;font-weight:900;line-height:1.2;}
.hinfo p{color:rgba(255,255,255,.65);font-size:10px;}
.hright{margin-left:auto;display:flex;gap:6px;align-items:center;}
.hbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;
  border-radius:20px;padding:4px 10px;font-size:10px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}

/* BOTTOM PANEL */
#panel{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:#fff;border-radius:18px 18px 0 0;
  box-shadow:0 -6px 30px rgba(0,0,0,.18);
  display:flex;flex-direction:column;
  transition:height .35s cubic-bezier(.25,.8,.25,1);
  will-change:height;
}

/* Handle */
.grip-wrap{padding:10px 0 2px;display:flex;justify-content:center;flex-shrink:0;cursor:grab;touch-action:none;}
.grip{width:38px;height:5px;background:#dde0e6;border-radius:3px;}

/* Day Tabs */
.day-tabs{display:flex;gap:6px;padding:4px 14px 10px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.dtab{
  flex-shrink:0;display:flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:22px;border:2px solid #e8ecf0;
  background:#f8fafe;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
  font-size:12px;font-weight:700;color:#888;transition:all .2s;
}
.dtab.on{color:#fff;border-color:transparent;}
.dtab[data-d="dep"].on{background:var(--dep);}
.dtab[data-d="1"].on{background:var(--d1);}
.dtab[data-d="2"].on{background:var(--d2);}
.dtab[data-d="3"].on{background:var(--d3);}
.dtab[data-d="4"].on{background:var(--d4);}
.dtab-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dtab:not(.on) .dtab-dot{background:#ccc;}
.dtab[data-d="dep"].on .dtab-dot,
.dtab[data-d="dep"] .dtab-dot:not(.white){background:var(--dep);}

/* Day header inside panel */
.day-header{
  padding:6px 14px 8px;flex-shrink:0;
  border-bottom:1px solid #f0f0f0;
}
.day-header h2{font-size:14px;font-weight:900;color:#1a1a2e;}
.day-header p{font-size:11px;color:#888;margin-top:1px;}

/* Spot list */
.spot-list{overflow-y:auto;flex:1;padding:8px 12px 24px;-webkit-overflow-scrolling:touch;}
.spot-list::-webkit-scrollbar{width:3px;}
.spot-list::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px;}

.sc{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:14px;margin-bottom:7px;
  background:#fafbfc;border:1.5px solid #f0f2f5;cursor:pointer;
  transition:all .12s;
}
.sc:active{background:#f0f2f5;transform:scale(.98);}
.sc.active{border-color:#3a80d0;background:#f0f7ff;}
.sc-num{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:900;color:#fff;
  flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.18);
}
.sc-body{flex:1;min-width:0;}
.sc-name{font-size:13px;font-weight:700;color:#111;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-sub{font-size:10px;color:#888;margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-tag{display:inline-block;font-size:9px;font-weight:700;
  padding:1px 7px;border-radius:8px;margin-top:3px;}
.sc-arr{color:#bbb;font-size:16px;flex-shrink:0;}

/* POPUP — mobile optimized */
.leaflet-popup-content-wrapper{
  border-radius:16px!important;border:none!important;padding:0!important;
  overflow:hidden!important;box-shadow:0 8px 36px rgba(0,0,0,.22)!important;
}
.leaflet-popup-tip-container{margin-top:-1px;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-close-button{
  z-index:10;top:8px!important;right:8px!important;
  width:30px!important;height:30px!important;font-size:18px!important;
  background:rgba(0,0,0,.35)!important;color:#fff!important;
  border-radius:50%!important;display:flex!important;
  align-items:center!important;justify-content:center!important;
  line-height:1!important;
}
.pu{font-family:'Noto Sans KR',sans-serif;width:min(300px,88vw);}
.pu-top{padding:13px 14px 10px;color:#fff;position:relative;}
.pu-day{font-size:10px;font-weight:700;opacity:.8;letter-spacing:.5px;margin-bottom:2px;}
.pu-name{font-size:15px;font-weight:900;line-height:1.2;padding-right:30px;}
.pu-kind{display:inline-block;font-size:10px;background:rgba(255,255,255,.22);
  padding:2px 8px;border-radius:8px;margin-top:4px;}
.pu-svg{width:100%;display:block;line-height:0;}
.pu-body{padding:10px 14px 14px;background:#fff;}
.pu-r{display:flex;gap:7px;margin-bottom:5px;align-items:flex-start;}
.pu-ri{font-size:13px;flex-shrink:0;}
.pu-rt{font-size:11.5px;color:#444;line-height:1.5;}
.pu-best{background:#fffbec;border:1.5px solid #f0c040;border-radius:10px;
  padding:8px 10px;margin-top:6px;}
.pu-bl{font-size:9px;font-weight:900;color:#b07800;letter-spacing:.8px;margin-bottom:3px;}
.pu-bv{font-size:12.5px;font-weight:700;color:#111;line-height:1.4;}

/* Legend pill (top-left of map) */
.leg-pill{
  position:fixed;left:10px;z-index:50;
  background:rgba(255,255,255,.95);border-radius:10px;
  padding:7px 10px;box-shadow:0 2px 10px rgba(0,0,0,.14);
  font-size:10px;
}
.leg-row{display:flex;align-items:center;gap:5px;padding:1.5px 0;color:#333;}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.leg-line{width:13px;height:3px;border-radius:2px;flex-shrink:0;}

/* Panel expand toggle button */
#tog{
  position:fixed;right:12px;z-index:150;
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:var(--navy);color:#fff;font-size:20px;
  box-shadow:0 3px 14px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">파란여행</div>
  <div class="hinfo">
    <h1>🗺️ 뉴욕 + 워싱턴 3박4일</h1>
    <p>토론토 출발 · 실제 경유지 기반 동선</p>
  </div>
  <div class="hright">
    <button class="hbtn" onclick="showAll()">전체보기</button>
  </div>
</header>

<!-- MAP -->
<div id="map"></div>

<!-- TOGGLE BUTTON -->
<button id="tog" title="일정 패널">☰</button>

<!-- BOTTOM PANEL -->
<div id="panel">
  <div class="grip-wrap" id="grip"><div class="grip"></div></div>

  <!-- DAY TABS -->
  <div class="day-tabs" id="day-tabs">
    <div class="dtab on" data-d="dep" onclick="selectDay('dep',this)">
      <div class="dtab-dot" style="background:var(--dep)"></div>출발
    </div>
    <div class="dtab" data-d="1" onclick="selectDay('1',this)">
      <div class="dtab-dot" style="background:var(--d1)"></div>1일차
    </div>
    <div class="dtab" data-d="2" onclick="selectDay('2',this)">
      <div class="dtab-dot" style="background:var(--d2)"></div>2일차
    </div>
    <div class="dtab" data-d="3" onclick="selectDay('3',this)">
      <div class="dtab-dot" style="background:var(--d3)"></div>3일차
    </div>
    <div class="dtab" data-d="4" onclick="selectDay('4',this)">
      <div class="dtab-dot" style="background:var(--d4)"></div>4일차
    </div>
  </div>

  <!-- DAY HEADER -->
  <div class="day-header" id="day-header">
    <h2 id="dh-title">🚌 출발지 (토론토 → 나이아가라)</h2>
    <p id="dh-sub">4개 탑승 포인트 · 버스 출발 순서대로</p>
  </div>

  <!-- SPOT LIST -->
  <div class="spot-list" id="spot-list"></div>
</div>

const map = L.map('map',{center:[40.5,-76.5],zoom:6,zoomControl:false,tap:true});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{
  attribution:'Tiles &copy; Esri',maxZoom:19
}).addTo(map);

const C={dep:'#5bb8f5',d1:'#f4a261',d2:'#2a9d8f',d3:'#e76f51',d4:'#9b72cf',meal:'#e8b84b',hotel:'#5ab0d8'};

/* ══════════════ 마커 아이콘 ══════════════ */
function mkIcon(e,color,sz=38){
  return L.divIcon({className:'',iconSize:[sz,sz+8],iconAnchor:[sz/2,sz+6],
    popupAnchor:[0,-(sz+10)],
    html:`<div style="position:relative;width:${sz}px;height:${sz+8}px">
      <div style="width:${sz}px;height:${sz}px;border-radius:50% 50% 50% 2px;
        transform:rotate(-45deg);background:${color};border:2.5px solid #fff;
        box-shadow:0 3px 12px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;">
        <span style="transform:rotate(45deg);font-size:${sz*.48}px;line-height:1">${e}</span>
      </div>
    </div>`});
}

/* ══════════════ 팝업 생성 ══════════════ */
function mkPopup(s, dayColor, dayLabel){
  const svg = s.img && IMGS[s.img]
    ? `<div class="pu-svg">${IMGS[s.img]}</div>` : '';
  const best = s.best
    ? `<div class="pu-best"><div class="pu-bl">⭐ 참고사항</div><div class="pu-bv">${s.best}</div></div>` : '';
  return `<div class="pu">
    <div class="pu-top" style="background:linear-gradient(135deg,${dayColor},${dayColor}cc)">
      <div class="pu-day">${dayLabel}</div>
      <div class="pu-name">${s.e} ${s.n}</div>
    </div>
    ${svg}
    <div class="pu-body">
      <div class="pu-r"><div class="pu-ri">📍</div><div class="pu-rt">${s.a}</div></div>
      <div class="pu-r"><div class="pu-ri">💬</div><div class="pu-rt">${s.d}</div></div>
      ${best}
    </div>
  </div>`;
}

/* ══════════════ 마커 배치 ══════════════ */
const allMarkers = {};
const dayColors = {dep:C.dep,'1':C.d1,'2':C.d2,'3':C.d3,'4':C.d4};
const dayLabels = {dep:'출발','1':'1일차','2':'2일차','3':'3일차','4':'4일차'};

Object.entries(DAYS).forEach(([day,data])=>{
  allMarkers[day] = [];
  const isHotel = (s) => s.e==='🏨';
  const isMeal  = (s) => ['🍜','🍽️'].includes(s.e);
  data.spots.forEach((s,i)=>{
    const color = isHotel(s)?C.hotel : isMeal(s)?C.meal : dayColors[day];
    const sz = isHotel(s)?42 : 36;
    const m = L.marker([s.lat,s.lng],{icon:mkIcon(s.e,color,sz)})
      .bindPopup(mkPopup(s,dayColors[day],`${dayLabels[day]} · ${i+1}번`),
        {maxWidth:310,className:'mobile-popup'});
    allMarkers[day].push(m);
  });
});

/* ══════════════ 루트 라인 ══════════════ */
const routes = {
  dep:{pts:[[43.6865,-79.5915],[43.5930,-79.6457],[43.4005,-79.7318],[43.0946,-79.0872]],dash:'5,5'},
  '1':{pts:[[43.0946,-79.0872],[42.9,-78.8],[42.3,-78.2],[41.7940,-77.0778],[40.8014,-76.8615],[40.2,-77.0],[39.6618,-77.7194],[39.6654,-77.7218]]},
  '2':{pts:[[39.6654,-77.7218],[38.9,-78.2],[38.6636,-78.4627],[38.8,-77.7],[38.8893,-77.0502],[38.8988,-77.0401],[38.8881,-77.0262],[39.0,-76.9],[39.1661,-76.6244],[39.7,-75.3],[40.0027,-74.8118]]},
  '3':{pts:[[40.0027,-74.8118],[40.5,-74.2],[40.7083,-74.0148],[40.7059,-74.0042],[40.7115,-74.0148],[40.7424,-74.0076],[40.7306,-73.9983],[40.7456,-73.9882],[40.7587,-73.9787],[40.7566,-73.9903],[40.7536,-74.0040],[40.82,-74.15],[40.8673,-74.3895]]},
  '4':{pts:[[40.8673,-74.3895],[41.1,-74.2],[41.3192,-74.1022],[41.8,-74.5],[42.0,-75.8],[42.6120,-76.1430],[43.0,-77.5],[43.0946,-79.0872],[43.35,-79.5],[43.6865,-79.5915]]}
};
const routeLayers = {};
Object.entries(routes).forEach(([day,r])=>{
  routeLayers[day] = L.polyline(r.pts,{
    color:dayColors[day],weight:3.5,opacity:.8,
    dashArray:r.dash||null
  });
});

/* ══════════════ 레전드 ══════════════ */
const legEl = document.createElement('div');
legEl.className='leg-pill';
legEl.innerHTML=`
  <div class="leg-row"><div class="leg-line" style="background:${C.dep};border-style:dashed"></div>출발 이동</div>
  <div class="leg-row"><div class="leg-line" style="background:${C.d1}"></div>1일차 동선</div>
  <div class="leg-row"><div class="leg-line" style="background:${C.d2}"></div>2일차 동선</div>
  <div class="leg-row"><div class="leg-line" style="background:${C.d3}"></div>3일차 동선</div>
  <div class="leg-row"><div class="leg-line" style="background:${C.d4}"></div>4일차 동선</div>
`;
document.body.appendChild(legEl);

/* ══════════════ PANEL 높이 관리 ══════════════ */
const panel = document.getElementById('panel');
const PEEK = 130;
const HALF = ()=>Math.floor(window.innerHeight*.42);
const FULL = ()=>Math.floor(window.innerHeight*.88);
let panelH = HALF();
let curDay = 'dep';
let activeIdx = -1;

function setPanel(h, animate=true){
  panelH = Math.max(PEEK, Math.min(FULL(), h));
  panel.style.height = panelH+'px';
  legEl.style.bottom = (panelH+10)+'px';
  document.getElementById('tog').style.bottom = (panelH+10)+'px';
}
setPanel(HALF(), false);

/* Drag handle */
let dragStart=0, dragH0=0, isDragging=false;
const grip = document.getElementById('grip');

function onDragStart(y){ dragStart=y; dragH0=panelH; isDragging=true; }
function onDragMove(y){
  if(!isDragging) return;
  const dy = dragStart-y;
  setPanel(dragH0+dy, false);
  panel.style.transition='none';
}
function onDragEnd(y){
  if(!isDragging) return;
  isDragging=false;
  panel.style.transition='height .3s cubic-bezier(.25,.8,.25,1)';
  const dy=dragStart-y;
  const vel=dy; // simple velocity approximation
  const mid=(PEEK+HALF())/2;
  const mid2=(HALF()+FULL())/2;
  if(panelH<mid) setPanel(PEEK);
  else if(panelH<mid2) setPanel(HALF());
  else setPanel(FULL());
}
grip.addEventListener('touchstart',e=>{onDragStart(e.touches[0].clientY);},{passive:true});
window.addEventListener('touchmove',e=>{if(isDragging)onDragMove(e.touches[0].clientY);},{passive:true});
window.addEventListener('touchend',e=>{onDragEnd(e.changedTouches[0].clientY);},{passive:true});
grip.addEventListener('mousedown',e=>{onDragStart(e.clientY);});
window.addEventListener('mousemove',e=>{if(isDragging)onDragMove(e.clientY);});
window.addEventListener('mouseup',e=>{onDragEnd(e.clientY);});

/* Tap map → collapse panel */
map.on('click',()=>setPanel(PEEK));
map.on('popupopen',()=>setPanel(PEEK));

/* Toggle button */
document.getElementById('tog').onclick = ()=>{
  if(panelH<=PEEK+10) setPanel(HALF());
  else setPanel(PEEK);
};

/* ══════════════ DAY 선택 ══════════════ */
function selectDay(day, tabEl){
  // Remove old markers/routes
  Object.values(allMarkers).flat().forEach(m=>map.removeLayer(m));
  Object.values(routeLayers).forEach(r=>map.removeLayer(r));

  // Add new
  allMarkers[day].forEach(m=>m.addTo(map));
  routeLayers[day]?.addTo(map);
  if(day!=='dep') routeLayers[day]?.addTo(map);
  // Also show dep route always
  if(day!=='dep') routeLayers['dep']?.addTo(map);

  // Update tab UI
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('on'));
  tabEl.classList.add('on');

  // Update header
  const d = DAYS[day];
  document.getElementById('dh-title').textContent = d.title;
  document.getElementById('dh-sub').textContent = d.sub;

  // Fly to day area
  map.flyTo(d.center, d.zoom, {duration:.8});

  curDay = day;
  activeIdx = -1;
  renderList(day);
  setPanel(HALF());
}

/* ══════════════ 스팟 리스트 렌더링 ══════════════ */
function renderList(day){
  const list = document.getElementById('spot-list');
  const data = DAYS[day];
  const color = dayColors[day];
  list.innerHTML = data.spots.map((s,i)=>{
    const isActive = i===activeIdx;
    const isHotel = s.e==='🏨';
    const isMeal  = ['🍜','🍽️'].includes(s.e);
    const bc = isHotel?C.hotel : isMeal?C.meal : color;
    return `<div class="sc${isActive?' active':''}" onclick="clickSpot(${i},'${day}')">
      <div class="sc-num" style="background:${bc}">${s.e}</div>
      <div class="sc-body">
        <div class="sc-name">${s.n}</div>
        <div class="sc-sub">${s.a}</div>
        ${s.d?`<span class="sc-tag" style="color:${bc};background:${bc}18">${s.d}</span>`:''}
      </div>
      <div class="sc-arr">›</div>
    </div>`;
  }).join('');
}

function clickSpot(i, day){
  activeIdx = i;
  const s = DAYS[day].spots[i];
  renderList(day);
  map.flyTo([s.lat,s.lng],15,{duration:.8});
  setTimeout(()=>allMarkers[day][i]?.openPopup(),850);
  setPanel(PEEK);
}

/* ══════════════ 전체보기 ══════════════ */
function showAll(){
  Object.values(allMarkers).flat().forEach(m=>m.addTo(map));
  Object.values(routeLayers).forEach(r=>r.addTo(map));
  map.flyTo([40.5,-76.5],6,{duration:1});
  setPanel(PEEK);
}

/* ══════════════ 초기 렌더링 ══════════════ */
selectDay('dep', document.querySelector('.dtab[data-d="dep"]'));
</script>
</body>
