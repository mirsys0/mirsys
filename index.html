<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 GitHub Pages 사이트</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        header {
            background: #2c3e50;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        h1 {
            margin: 0;
            font-size: 2.8rem;
        }
        
        .subtitle {
            font-size: 1.3rem;
            opacity: 0.9;
            margin-top: 10px;
        }
        
        main {
            padding: 50px 40px;
            text-align: center;
        }
        
        p {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #555;
        }
        
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 32px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-3px);
        }
        
        footer {
            padding: 20px;
            text-align: center;
            background: #f8f9fa;
            color: #777;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>환영합니다! 🎉</h1>
            <p class="subtitle">GitHub Pages 호스팅 테스트 사이트</p>
        </header>
        
        <main>
            <p>
                이 페이지가 정상적으로 보인다면 GitHub Pages가 제대로 작동하는 거예요!<br>
                이제 마음껏 HTML, CSS, JavaScript를 추가해서 테스트해보세요.
            </p>
            
            <a href="https://github.com" target="_blank" class="btn">GitHub 바로가기</a>
        </main>
        
        <footer>
            &copy; 2026 Lewis의 GitHub Pages 테스트 사이트<br>
            이 파일은 Grok이 만들어드렸습니다 😊
        </footer>
    </div>
</body>
</html>
